# Notifica por WhatsApp sobre PRs:
#   - Abierto hacia `dev`  -> avisa al admin (comportamiento original).
#   - Cerrado (con o sin merge) hacia `dev` o `main` -> avisa al AUTOR del PR
#     (teléfono en Firestore contributors/{login}.telefonoWhatsapp) y al admin.
#
# Colocar este archivo como `.github/workflows/notify-pr-dev.yml` en CADA repo
# monitoreado:
#   - jorgeIMendoza/sozu-admin
#   - jorgeIMendoza/sozu-supabase-migrations
#   - jorgeIMendoza/sozu-edge-functions
#   - jorgeIMendoza/sozu-n8n-workflows
#   - sozu-com/server-stp

name: Notificar PR (WhatsApp)

on:
  pull_request:
    types: [opened, reopened, ready_for_review, closed]
    branches: [dev, main]

jobs:
  notify-abierto:
    # Solo PRs abiertos hacia dev (igual que antes)
    if: github.event.action != 'closed' && github.event.pull_request.base.ref == 'dev'
    runs-on: ubuntu-latest
    steps:
      - name: Enviar WhatsApp (admin)
        env:
          N8N_WEBHOOK: https://automatizacion-n8n.fbqqbe.easypanel.host/webhook/manda_notificacion
          N8N_APIKEY: 80FA62E3FD0C-4477-8B31-8A2CD6AF7B57
          DESTINO: "+5217221514185"
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUM: ${{ github.event.number }}
          REPO_FULL: ${{ github.repository }}
          REPO_NAME: ${{ github.event.repository.name }}
          ACTOR: ${{ github.actor }}
        run: |
          # Detectar TODOS los autores reales desde el body (una línea
          # <!-- pr_author: login --> por autor; el dashboard las embebe).
          PR_BODY="$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${REPO_FULL}/pulls/${PR_NUM}" \
            | jq -r '.body // ""')"
          AUTORES="$(printf '%s' "$PR_BODY" \
            | grep -oP '(?<=<!-- pr_author: )[\w.-]+(?= -->)' 2>/dev/null | sort -u | paste -sd ', ' || true)"
          AUTOR="${AUTORES:-$ACTOR}"
          curl -s -X POST "$N8N_WEBHOOK" \
            -H "apikey: $N8N_APIKEY" \
            -H "Content-Type: application/json" \
            -d "{\"tipo\":\"wa\",\"telefono\":\"${DESTINO}\",\"mensajeWA\":\"Hay un PR para DEV del repo: ${REPO_NAME}, cambios de: ${AUTOR}\",\"instanciaWA\":\"Pruebas de todo\"}"

  notify-cerrado:
    # PR cerrado (mergeado o no) hacia dev o main -> avisa al autor + admin
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Autenticar a Google Cloud (Firestore)
        continue-on-error: true
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_GCP_DEV }}

      - name: Configurar gcloud
        continue-on-error: true
        uses: google-github-actions/setup-gcloud@v2

      - name: Enviar WhatsApp (autor y admin)
        env:
          N8N_WEBHOOK: https://automatizacion-n8n.fbqqbe.easypanel.host/webhook/manda_notificacion
          N8N_APIKEY: 80FA62E3FD0C-4477-8B31-8A2CD6AF7B57
          ADMIN: "+5217221514185"
          FIRESTORE_PROJECT: sozu-admin-dev
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ACTOR_LOGIN: ${{ github.event.pull_request.user.login }}
          PR_NUM: ${{ github.event.number }}
          MERGED: ${{ github.event.pull_request.merged }}
          BASE: ${{ github.event.pull_request.base.ref }}
          REPO: ${{ github.event.repository.name }}
          REPO_FULL: ${{ github.repository }}
          CERRADO_POR: ${{ github.actor }}
        run: |
          # Detectar TODOS los autores reales: líneas <!-- pr_author: login -->
          # del body (una por autor; el dashboard las embebe según los commits).
          PR_BODY="$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${REPO_FULL}/pulls/${PR_NUM}" \
            | jq -r '.body // ""')"
          AUTORES="$(printf '%s' "$PR_BODY" \
            | grep -oP '(?<=<!-- pr_author: )[\w.-]+(?= -->)' 2>/dev/null | sort -u || true)"
          if [ -z "$AUTORES" ]; then AUTORES="$ACTOR_LOGIN"; fi
          echo "Autores a notificar: $(echo "$AUTORES" | paste -sd ', ')"

          if [ "$MERGED" = "true" ]; then
            MSG="Tu PR #${PR_NUM} del repo ${REPO} fue MERGEADO a ${BASE} por ${CERRADO_POR}"
          else
            MSG="Tu PR #${PR_NUM} del repo ${REPO} (hacia ${BASE}) fue CERRADO sin merge por ${CERRADO_POR}"
          fi
          send() {
            PAYLOAD=$(jq -n --arg tel "$1" --arg msg "$MSG" \
              '{tipo:"wa",telefono:$tel,mensajeWA:$msg,instanciaWA:"Pruebas de todo"}')
            curl -s -X POST "$N8N_WEBHOOK" \
              -H "apikey: $N8N_APIKEY" \
              -H "Content-Type: application/json" \
              -d "$PAYLOAD" >/dev/null
          }
          # Teléfono de CADA autor desde Firestore (lectura vía service account)
          ACCESS_TOKEN="$(gcloud auth print-access-token 2>/dev/null || true)"
          while IFS= read -r AUTOR; do
            [ -z "$AUTOR" ] && continue
            PHONE=""
            if [ -n "$ACCESS_TOKEN" ]; then
              PHONE="$(curl -s -H "Authorization: Bearer $ACCESS_TOKEN" \
                "https://firestore.googleapis.com/v1/projects/${FIRESTORE_PROJECT}/databases/(default)/documents/contributors/${AUTOR}" \
                | jq -r '.fields.telefonoWhatsapp.stringValue // empty')"
            fi
            if [ -n "$PHONE" ]; then
              send "+521${PHONE}" && echo "Notificado autor ${AUTOR}"
            else
              echo "Sin teléfono guardado para '${AUTOR}'; se omite."
            fi
          done <<< "$AUTORES"
          send "$ADMIN" && echo "Notificado admin"
