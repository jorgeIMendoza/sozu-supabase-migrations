name: Deploy Migrations to Dev

on:
  push:
    branches: [dev]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Instalar cliente PostgreSQL
        run: sudo apt-get install -y postgresql-client -q

      - name: Sincronizar historial de migraciones
        env:
          PGSSLMODE: disable
        run: |
          psql "${{ secrets.DEV_DB_URL }}" <<'SQL'
            DELETE FROM supabase_migrations.schema_migrations
            WHERE version < '20260513000000';

            INSERT INTO supabase_migrations.schema_migrations (version)
            VALUES ('20260513000000'), ('20260513000001'),
                   ('20260513000002'), ('20260513000003')
            ON CONFLICT (version) DO NOTHING;
          SQL

      - name: Deploy migrations to dev
        env:
          PGSSLMODE: disable
        run: supabase db push --db-url "${{ secrets.DEV_DB_URL }}"

      - name: Autenticar a Google Cloud (Firestore)
        if: success()
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_GCP_DEV }}

      - name: Configurar gcloud
        if: success()
        uses: google-github-actions/setup-gcloud@v2

      - name: Notificar deploy listo (WhatsApp)
        if: success()
        env:
          ENVIRONMENT: DEV
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FIRESTORE_PROJECT: sozu-admin-dev
          N8N_WEBHOOK: https://automatizacion-n8n.fbqqbe.easypanel.host/webhook/manda_notificacion
          N8N_APIKEY: 80FA62E3FD0C-4477-8B31-8A2CD6AF7B57
        run: bash ci/notify-deploy.sh
