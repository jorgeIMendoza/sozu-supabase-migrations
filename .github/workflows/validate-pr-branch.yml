name: Validate PR Source Branch

on:
  pull_request:
    branches: [main]

jobs:
  validate-branch:
    runs-on: ubuntu-latest
    steps:
      - name: Check if PR is from dev branch
        run: |
          if [[ "${{ github.head_ref }}" != "dev" ]]; then
            echo "❌ Error: Solo se permiten PRs desde la rama dev hacia main"
            echo "PR creado desde: ${{ github.head_ref }}"
            exit 1
          fi
          echo "✅ PR válido desde rama dev"